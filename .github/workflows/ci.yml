name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: ${{ matrix.recipe }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        recipe: [lint, build, test, deadcode]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: extractions/setup-just@v3

      - name: Install dev tools
        run: ./setup.sh

      - run: just ${{ matrix.recipe }}
